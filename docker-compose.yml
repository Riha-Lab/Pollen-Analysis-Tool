# ─────────────────────────────────────────────────────────────────────────────
#  Pollen Analysis Tool — Docker Compose
#
#  Quick start (Linux / macOS with XQuartz / Windows with VcXsrv):
#    docker compose up
#
#  GPU (NVIDIA) users:
#    docker compose --profile gpu up
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  image: vivekraxwal/pollen-analysis:latest
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - "${HOME:-~}/PollenData:/data"
    - pollen_weights:/root/.cache
  environment:
    - DISPLAY=${DISPLAY:-:0}
    - QT_QPA_PLATFORM=xcb
    - QT_AUTO_SCREEN_SCALE_FACTOR=1
  network_mode: host
  stdin_open: true
  tty: true

services:

  pollen:
    <<: *common

  pollen-gpu:
    <<: *common
    profiles: [gpu]
    image: vivekraxwal/pollen-analysis:gpu
    build:
      context: .
      dockerfile: Dockerfile.gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  pollen_weights:
